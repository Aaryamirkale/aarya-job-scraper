name: Job Scraper - Every 3 Hours

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python job_scraper.py

      - name: Commit and push results
        run: |
          git config --global user.name "Job Scraper Bot"
          git config --global user.email "bot@github.com"
          git add results/
          git diff --staged --quiet || git commit -m "Job update $(date '+%Y-%m-%d %H:%M UTC')"
          git push
